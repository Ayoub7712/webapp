<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Hub - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <canvas id="particleCanvas"></canvas>

    <div class="login-container">
        <div class="login-card">
            <!-- Left Side - Branding -->
            <div class="login-brand">
                <div class="login-brand-content">
                    <div class="login-logo-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <h1>Student<span>Hub</span></h1>
                    <p>Your modern student management platform</p>
                    <div class="login-features">
                        <div class="login-feature">
                            <i class="fas fa-check-circle"></i>
                            <span>Manage student records</span>
                        </div>
                        <div class="login-feature">
                            <i class="fas fa-check-circle"></i>
                            <span>Track classes & progress</span>
                        </div>
                        <div class="login-feature">
                            <i class="fas fa-check-circle"></i>
                            <span>Beautiful modern interface</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="login-form-side">
                <div class="login-form-content">
                    <h2>Welcome Back</h2>
                    <p class="login-subtitle">Sign in to continue to StudentHub</p>

                    <form id="loginForm" class="login-form">
                        <div class="login-input-group">
                            <div class="login-input-icon"><i class="fas fa-user"></i></div>
                            <input type="text" id="username" required placeholder="Username" autocomplete="username">
                        </div>
                        <div class="login-input-group">
                            <div class="login-input-icon"><i class="fas fa-lock"></i></div>
                            <input type="password" id="password" required placeholder="Password" autocomplete="current-password">
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>

                        <div id="loginError" class="login-error" style="display: none;">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span id="loginErrorText">Invalid credentials</span>
                        </div>

                        <button type="submit" class="login-btn" id="loginBtn">
                            <span class="login-btn-text">Sign In</span>
                            <span class="login-btn-loader" style="display: none;">
                                <i class="fas fa-spinner fa-spin"></i>
                            </span>
                        </button>
                    </form>

                    <div class="login-divider">
                        <span>Demo Credentials</span>
                    </div>
                    <div class="login-demo">
                        <div class="demo-cred">
                            <i class="fas fa-user"></i> <strong>admin</strong>
                        </div>
                        <div class="demo-cred">
                            <i class="fas fa-key"></i> <strong>admin123</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ========== PARTICLE BACKGROUND ==========
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.radius = Math.random() * 2 + 0.5;
            this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());

    function drawLines() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(99, 102, 241, ${0.15 * (1 - dist / 150)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawLines();
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ========== LOGIN LOGIC ==========
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const btnText = btn.querySelector('.login-btn-text');
        const btnLoader = btn.querySelector('.login-btn-loader');
        const errorDiv = document.getElementById('loginError');
        const errorText = document.getElementById('loginErrorText');

        btnText.style.display = 'none';
        btnLoader.style.display = 'inline';
        errorDiv.style.display = 'none';

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok && data.success) {
                sessionStorage.setItem('auth_token', data.token);
                sessionStorage.setItem('auth_user', username);
                btn.classList.add('login-btn-success');
                btnLoader.style.display = 'none';
                btnText.textContent = 'Welcome!';
                btnText.style.display = 'inline';
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 600);
            } else {
                errorText.textContent = data.error || 'Invalid credentials';
                errorDiv.style.display = 'flex';
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
                // Shake animation
                document.querySelector('.login-form-side').classList.add('shake');
                setTimeout(() => document.querySelector('.login-form-side').classList.remove('shake'), 500);
            }
        } catch (err) {
            errorText.textContent = 'Connection error. Try again.';
            errorDiv.style.display = 'flex';
            btnText.style.display = 'inline';
            btnLoader.style.display = 'none';
        }
    });

    // Redirect if already logged in
    if (sessionStorage.getItem('auth_token')) {
        window.location.href = '/index.html';
    }
    </script>
</body>
</html>
